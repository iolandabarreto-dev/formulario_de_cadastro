<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="container">
      <header id="topbar">
        <h1 class="titulo">Cadastro de clientes</h1>
        <div id="operador-container">
          <span id="showoperador">Operador(a) atual: </span>
          <span id="operador"></span>
        </div>
      </header>
      <main id="principal-container">
        <section class="section-formulario">
          <h2>**Formulário de cadastro**</h2>
          <p>Bem vindo a nossa página!</p>
          <p>Insira seus dados para cadastro</p>
          <form action="" class="formulario">
            <label for="nome">Nome:</label>
            <input
              type="text"
              id="nome"
              placeholder="Insira seu nome aqui"
              required
            />
            <label for="sobrenome">Sobrenome:</label>
            <input
              type="text"
              id="sobrenome"
              placeholder="Insira seu sobrenome aqui"
              required
            />
            <label for="email">E-mail:</label>
            <input
              type="email"
              id="email"
              placeholder="Insira seu e-mail aqui"
              required
            />
            <label for="cep">CEP:</label>
            <input
              id="cep"
              type="text"
              placeholder="Insira o seu CEP aqui"
              required
              maxlength="8"
            />

            <label for="rua" class="secao-cep">Rua:</label>
            <input id="rua" type="text" class="secao-cep" placeholder="" />

            <label for="bairro" class="secao-cep">Bairro:</label>
            <input id="bairro" type="text" class="secao-cep" placeholder="" />

            <label for="cidade" class="secao-cep">Cidade:</label>
            <input id="cidade" type="text" class="secao-cep" placeholder="" />

            <label for="estado" class="secao-cep">Estado:</label>
            <input id="estado" type="text" class="secao-cep" placeholder="" />

            <label for="plano">Tipo de plano:</label>
            <select name="plano_tipo" id="plano" required>
              <option value="" selected disabled>Escolha seu plano</option>
              <option value="gold">Gold</option>
              <option value="silver">Silver</option>
              <option value="bronze">Bronze</option>
            </select>

            <div class="formulario_bottom">
              <div id="status-icon"></div>
              <div id="status"></div>
              <button id="btn-formulario">Cadastrar</button>
            </div>
          </form>

          <section class="section-mensagem">
            <div id="mensagem-resultado"></div>
          </section>
        </section>

        <section class="section-painel">
          <h2>**Clientes Cadastrados**</h2>
          <div class="filtro-painel">
            <div class="search-painel">
              <label for="busca">Buscar cliente:</label>
              <input
                type="text"
                id="busca"
                placeholder="Digite o nome ou e-mail"
              />
            </div>

            <select id="filtro-tipo">
              <option value="todos">Todos</option>
              <option value="gold">Gold</option>
              <option value="silver">Silver</option>
              <option value="bronze">Bronze</option>
            </select>
          </div>
          <div class="card-painel"></div>
        </section>
      </main>
      <footer id="rodape-container">
        <p>
          Aplicação desenvolvida na Formação Continuada de Front-End do
          CaixaVerso
        </p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
